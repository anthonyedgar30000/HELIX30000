name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-conversation-roles:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate conversation-role registry
        run: python scripts/validate_conversation_roles.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Confirm changed scope is coordination-only
        run: |
          test -f .helix/conversation-role-registry.json
          test -f .project/active-work.json
          test -f docs/conversation-role-cards.md
